name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          protocol: ftps
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/application/cache/**
            **/application/logs/**
            **/assets/**
            **/assets_guru/**
            **/assets_siswa/**
